<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSC — Text Sticker Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Assistant:wght@300;400;700;800&family=Frank+Ruhl+Libre:wght@400;700;900&family=Rubik:wght@300;400;700;900&family=Secular+One&family=Noto+Sans+Hebrew:wght@300;400;700;900&family=Alef:wght@400;700&family=Miriam+Libre:wght@400;700&family=Varela+Round&family=David+Libre:wght@400;700;900&family=Suez+One&family=Noto+Serif+Hebrew:wght@300;400;700;900&family=Noto+Rashi+Hebrew:wght@300;400;700;900&family=Amatic+SC:wght@400;700&family=Caveat:wght@400;700&family=Permanent+Marker&family=Pacifico&family=Lobster&family=Bebas+Neue&family=Righteous&family=Press+Start+2P&family=Tinos:wght@400;700&family=Arimo:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080f;--surface:#12121c;--surface2:#1c1c28;--border:#262636;
  --accent:#ff6b6b;--accent2:#4ecdc4;--accent3:#ffe66d;--accent4:#c77dff;
  --text:#f0f0f8;--muted:#52527a;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Heebo',Arial,sans-serif;min-height:100vh;display:grid;grid-template-columns:340px 1fr;grid-template-rows:50px 1fr;}
header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;gap:10px;}
.logo{font-size:20px;}
header h1{font-size:15px;font-weight:800;letter-spacing:.05em;}
header h1 span{color:var(--accent);}
.hbadge{margin-right:auto;font-size:10px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:2px 10px;border-radius:20px;}
aside{background:var(--surface);border-left:1px solid var(--border);padding:11px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:11px;}
.slabel{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
textarea#txt{width:100%;min-height:66px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;padding:9px;resize:vertical;font-family:'Heebo',Arial,sans-serif;line-height:1.5;}
textarea#txt:focus{outline:none;border-color:var(--accent2);}
.font-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px;}
.ftab{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;transition:all .15s;font-family:'Heebo',Arial,sans-serif;}
.ftab.active{background:var(--accent2);border-color:var(--accent2);color:#000;font-weight:700;}
.font-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.font-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 5px;cursor:pointer;text-align:center;color:var(--text);transition:all .15s;line-height:1.2;}
.font-btn:hover{border-color:var(--accent2);}
.font-btn.active{background:rgba(78,205,196,.15);border-color:var(--accent2);color:var(--accent2);}
.font-btn .fs{font-size:15px;display:block;margin-bottom:1px;}
.font-btn .fn{font-size:9px;color:var(--muted);}
select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 9px;font-size:12px;width:100%;cursor:pointer;font-family:'Heebo',Arial,sans-serif;}
select:focus{outline:none;border-color:var(--accent2);}
input[type=range]{padding:0;height:5px;-webkit-appearance:none;border-radius:3px;background:var(--border);cursor:pointer;width:100%;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;}
input[type=color]{height:31px;padding:2px 4px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;width:100%;}
.rv{font-size:10px;color:var(--accent);min-width:24px;text-align:left;}
.row{display:flex;gap:6px;align-items:center;}
.col{display:flex;flex-direction:column;gap:3px;flex:1;}
.lbl{font-size:10px;color:var(--muted);}
.toggles{display:flex;gap:3px;flex-wrap:wrap;}
.tbtn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:4px 9px;font-size:11px;cursor:pointer;transition:all .15s;font-family:'Heebo',Arial,sans-serif;}
.tbtn.active{background:var(--accent2);border-color:var(--accent2);color:#000;font-weight:700;}
.erow{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px;display:flex;flex-direction:column;gap:7px;}
.ehdr{display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:700;}
.sw{position:relative;display:inline-block;width:33px;height:18px;}
.sw input{opacity:0;width:0;height:0;}
.sw-s{position:absolute;inset:0;background:var(--border);border-radius:18px;cursor:pointer;transition:.2s;}
.sw-s::before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.sw input:checked+.sw-s{background:var(--accent2);}
.sw input:checked+.sw-s::before{transform:translateX(15px);}
.btn{width:100%;padding:8px;border-radius:var(--radius);font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Heebo',Arial,sans-serif;transition:all .15s;}
.btn-p{background:var(--accent);color:#fff;}
.btn-p:hover{filter:brightness(1.15);transform:translateY(-1px);}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-s:hover{border-color:var(--accent2);}
.btn-g{background:linear-gradient(135deg,var(--accent2),var(--accent3));color:#000;}
.btn-g:hover{opacity:.9;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.choice-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 4px;cursor:pointer;text-align:center;font-size:10px;color:var(--muted);transition:all .15s;font-family:'Heebo',Arial,sans-serif;}
.choice-btn:hover{border-color:var(--accent4);color:var(--accent4);}
.choice-btn.active{background:rgba(199,125,255,.15);border-color:var(--accent4);color:var(--accent4);}
.choice-icon{font-size:14px;display:block;margin-bottom:2px;}
.anim-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.abtn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 2px;cursor:pointer;text-align:center;font-size:9px;color:var(--muted);transition:all .15s;font-family:'Heebo',Arial,sans-serif;}
.abtn:hover{border-color:var(--accent);color:var(--accent);}
.abtn.active{background:rgba(255,107,107,.15);border-color:var(--accent);color:var(--accent);}
.abtn-icon{font-size:13px;display:block;margin-bottom:1px;}
#gifStatus{font-size:10px;color:var(--accent3);min-height:13px;margin-top:3px;}
#fontStatus{font-size:10px;color:var(--accent2);min-height:12px;margin-top:2px;}
main{display:flex;flex-direction:column;align-items:center;padding:18px 14px;gap:13px;background:var(--bg);overflow-y:auto;}
.cwrap{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 16px 50px rgba(0,0,0,.6);}
.cbg{position:absolute;inset:0;background-image:linear-gradient(45deg,#1a1a26 25%,transparent 25%),linear-gradient(-45deg,#1a1a26 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1a1a26 75%),linear-gradient(-45deg,transparent 75%,#1a1a26 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;background-color:#141420;}
canvas#cv{position:relative;display:block;max-width:640px;max-height:340px;}
#animDiv{display:none;min-width:100px;min-height:60px;align-items:center;justify-content:center;padding:14px;position:relative;}
.hint{font-size:11px;color:var(--muted);text-align:center;}
.carea{width:100%;max-width:650px;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px;}
.carea h3{font-size:10px;color:var(--muted);margin-bottom:7px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;}
.dzone{border:2px dashed var(--border);border-radius:9px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s;color:var(--muted);font-size:12px;}
.dzone:hover{border-color:var(--accent2);}
.dzone input{display:none;}
#cc{width:100%;border-radius:8px;display:none;margin-top:9px;border:1px solid var(--border);}
.pgrid{display:none;grid-template-columns:1fr 1fr;gap:6px;margin-top:7px;}
#cctrl{display:none;gap:6px;margin-top:6px;flex-wrap:wrap;}
#cctrl .btn{flex:1;min-width:90px;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<header>
  <span class="logo">✦</span>
  <h1>Text <span>Sticker</span> Creator</h1>
  <span class="hbadge">PNG · GIF · עברית · אמוג'י</span>
</header>

<aside>
  <div>
    <div class="slabel">טקסט</div>
    <textarea id="txt">שלום עולם! 🌟</textarea>
  </div>

  <!-- FONTS -->
  <div>
    <div class="slabel">פונט</div>
    <div class="font-tabs" id="fontTabs"></div>
    <div class="font-grid" id="fontGrid"></div>
    <div id="fontStatus"></div>
    <button class="btn btn-s" onclick="document.getElementById('cff').click()" style="margin-top:5px;font-size:10px;padding:5px">+ טען פונט מהמחשב (TTF/OTF)</button>
    <input type="file" id="cff" accept=".ttf,.otf,.woff,.woff2" style="display:none">
  </div>

  <!-- SIZE & WEIGHT -->
  <div>
    <div class="slabel">גודל ומשקל</div>
    <div class="row" style="gap:5px"><input type="range" id="sz" min="16" max="280" value="72"><span class="rv" id="szv">72</span></div>
    <div style="margin-top:5px"><select id="fw"><option value="300">דק 300</option><option value="400">רגיל 400</option><option value="700" selected>מודגש 700</option><option value="900">שחור 900</option></select></div>
  </div>

  <!-- STYLE -->
  <div>
    <div class="slabel">סגנון וכיוון</div>
    <div class="toggles">
      <button class="tbtn" id="tI">𝘐 נטוי</button>
      <button class="tbtn" id="tU">U̲ קו</button>
      <button class="tbtn" id="tUP">AA</button>
      <button class="tbtn active" id="tR">RTL</button>
    </div>
  </div>

  <!-- ALIGN -->
  <div>
    <div class="slabel">יישור</div>
    <div class="toggles">
      <button class="tbtn active" data-align="right">⬅ ימין</button>
      <button class="tbtn" data-align="center">⬌ מרכז</button>
      <button class="tbtn" data-align="left">➡ שמאל</button>
    </div>
  </div>

  <!-- TEXT SHAPE -->
  <div>
    <div class="slabel">🔤 צורת טקסט</div>
    <div class="grid2" id="shapeGrid">
      <button class="choice-btn active" data-shape="normal"><span class="choice-icon">▬</span>רגיל</button>
      <button class="choice-btn" data-shape="arch"><span class="choice-icon">⌢</span>קשת</button>
      <button class="choice-btn" data-shape="wave"><span class="choice-icon">〜</span>גל</button>
      <button class="choice-btn" data-shape="bulge"><span class="choice-icon">◉</span>בליטה</button>
      <button class="choice-btn" data-shape="narrow"><span class="choice-icon">⟨ ⟩</span>צר→רחב</button>
      <button class="choice-btn" data-shape="scroll"><span class="choice-icon">📜</span>מגילה</button>
      <button class="choice-btn" data-shape="perspective"><span class="choice-icon">⬡</span>פרספקטיבה</button>
      <button class="choice-btn" data-shape="circle"><span class="choice-icon">○</span>עיגול</button>
    </div>
  </div>

  <!-- COLORS -->
  <div>
    <div class="slabel">צבע</div>
    <div class="row">
      <div class="col"><label class="lbl">טקסט</label><input type="color" id="tc" value="#ffffff"></div>
      <div class="col"><label class="lbl">אטימות <span class="rv" id="opv">100%</span></label><input type="range" id="op" min="10" max="100" value="100"></div>
    </div>
  </div>

  <div><div class="slabel">מרווח שורות <span class="rv" id="lhv">1.3</span></div><input type="range" id="lh" min="80" max="220" value="130"></div>

  <div class="erow">
    <div class="ehdr"><span>✏️ מסגרת</span><label class="sw"><input type="checkbox" id="stEn"><span class="sw-s"></span></label></div>
    <div id="stC" style="display:none;flex-direction:column;gap:6px">
      <div class="row">
        <div class="col"><label class="lbl">צבע</label><input type="color" id="stCol" value="#000000"></div>
        <div class="col"><label class="lbl">עובי <span class="rv" id="stWv">4</span></label><input type="range" id="stW" min="1" max="30" value="4"></div>
      </div>
    </div>
  </div>

  <div class="erow">
    <div class="ehdr"><span>💫 צל/זוהר</span><label class="sw"><input type="checkbox" id="shEn"><span class="sw-s"></span></label></div>
    <div id="shC" style="display:none;flex-direction:column;gap:6px">
      <div class="row">
        <div class="col"><label class="lbl">צבע</label><input type="color" id="shCol" value="#000000"></div>
        <div class="col"><label class="lbl">טשטוש <span class="rv" id="shBv">10</span></label><input type="range" id="shB" min="0" max="60" value="10"></div>
      </div>
      <div class="row">
        <div class="col"><label class="lbl">X <span class="rv" id="shXv">3</span></label><input type="range" id="shX" min="-30" max="30" value="3"></div>
        <div class="col"><label class="lbl">Y <span class="rv" id="shYv">3</span></label><input type="range" id="shY" min="-30" max="30" value="3"></div>
      </div>
    </div>
  </div>

  <!-- PRESETS -->
  <div>
    <div class="slabel">פריסטים מהירים</div>
    <div class="grid2">
      <button class="choice-btn" onclick="preset('neon')">🌟 ניאון</button>
      <button class="choice-btn" onclick="preset('gold')">✨ זהב</button>
      <button class="choice-btn" onclick="preset('outline')">⬜ קונטור</button>
      <button class="choice-btn" onclick="preset('fire')">🔥 אש</button>
      <button class="choice-btn" onclick="preset('3d')">🎭 3D</button>
      <button class="choice-btn" onclick="preset('clean')">🌿 נקי</button>
    </div>
  </div>

  <div><div class="slabel">ריפוד <span class="rv" id="pdv">30</span>px</div><input type="range" id="pd" min="0" max="120" value="30"></div>

  <!-- ANIMATIONS -->
  <div>
    <div class="slabel">🎬 אנימציה</div>
    <div class="anim-grid">
      <button class="abtn active" data-anim="none"><span class="abtn-icon">🚫</span>ללא</button>
      <button class="abtn" data-anim="typewriter"><span class="abtn-icon">⌨️</span>כתיבה</button>
      <button class="abtn" data-anim="wave"><span class="abtn-icon">🌊</span>גל</button>
      <button class="abtn" data-anim="pop"><span class="abtn-icon">💥</span>פופ</button>
      <button class="abtn" data-anim="zoom"><span class="abtn-icon">🔍</span>זום</button>
      <button class="abtn" data-anim="slide"><span class="abtn-icon">➡️</span>כניסה</button>
      <button class="abtn" data-anim="rainbow"><span class="abtn-icon">🌈</span>קשת</button>
      <button class="abtn" data-anim="shake"><span class="abtn-icon">📳</span>רטט</button>
      <button class="abtn" data-anim="bounce"><span class="abtn-icon">🏀</span>קפיצה</button>
      <button class="abtn" data-anim="spin"><span class="abtn-icon">🌀</span>סיבוב</button>
      <button class="abtn" data-anim="flip"><span class="abtn-icon">🔄</span>הפיכה</button>
      <button class="abtn" data-anim="blur"><span class="abtn-icon">✨</span>זוהר</button>
    </div>

    <!-- Typewriter speed (shown only when typewriter selected) -->
    <div id="twSpeed" style="display:none;margin-top:6px">
      <div class="slabel">מהירות כתיבה <span class="rv" id="twSpeedV">150</span>ms</div>
      <input type="range" id="twSpeedR" min="50" max="500" value="150" oninput="S.twSpeed=+this.value;document.getElementById('twSpeedV').textContent=this.value;if(S.anim==='typewriter')renderAnim(getLines())">
    </div>

    <div id="gifStatus"></div>
    <button class="btn btn-g" id="gifBtn" onclick="exportGIF()" style="display:none;margin-top:5px">🎬 הורד GIF מונפש</button>
  </div>

  <div style="display:flex;flex-direction:column;gap:5px">
    <button class="btn btn-p" onclick="dlPNG()">⬇ הורד PNG שקוף</button>
    <button class="btn btn-s" onclick="copyClip()">📋 העתק ללוח</button>
  </div>
</aside>

<main>
  <div class="cwrap">
    <div class="cbg"></div>
    <canvas id="cv" width="600" height="200"></canvas>
    <div id="animDiv"></div>
  </div>
  <p class="hint">רקע משובץ = שקיפות מלאה · PNG להדבקה · GIF לאנימציה</p>

  <div class="carea">
    <h3>🖼 הדבק על תמונה</h3>
    <div class="dzone" onclick="document.getElementById('bgi').click()">
      <input type="file" id="bgi" accept="image/*" onchange="loadBg(this)">
      <div style="font-size:20px;margin-bottom:3px">🖼</div>לחץ לבחירת תמונת רקע
    </div>
    <canvas id="cc"></canvas>
    <div class="pgrid" id="pg">
      <div><label class="lbl">X</label><input type="range" id="px" min="0" max="100" value="50" oninput="compUpdate()"></div>
      <div><label class="lbl">Y</label><input type="range" id="py" min="0" max="100" value="50" oninput="compUpdate()"></div>
      <div><label class="lbl">גודל %</label><input type="range" id="psc" min="5" max="150" value="60" oninput="compUpdate()"></div>
      <div><label class="lbl">סיבוב</label><input type="range" id="pro" min="-180" max="180" value="0" oninput="compUpdate()"></div>
    </div>
    <div id="cctrl">
      <button class="btn btn-s" style="flex:1" onclick="document.getElementById('bgi').click()">🔄 החלף</button>
      <button class="btn btn-p" style="flex:1" onclick="dlComp()">⬇ הורד תמונה</button>
    </div>
  </div>
</main>

<script>
// ══════════════════════════════════════════════════
//  FONT DEFINITIONS
// ══════════════════════════════════════════════════
const FONT_CATS = {
  'עברית מודרני': [
    {name:'Heebo',             sample:'שלום', desc:'עגול נקי'},
    {name:'Assistant',         sample:'שלום', desc:'רגוע'},
    {name:'Rubik',             sample:'שלום', desc:'חזק'},
    {name:'Noto Sans Hebrew',  sample:'שלום', desc:'ניטרלי'},
    {name:'Alef',              sample:'שלום', desc:'פשוט'},
    {name:'Varela Round',      sample:'שלום', desc:'עגלגל'},
    {name:'Secular One',       sample:'שלום', desc:'מרובע'},
    {name:'Arimo',             sample:'שלום', desc:'Arial-עברי'},
  ],
  'עברית סריף': [
    {name:'Frank Ruhl Libre',  sample:'שלום', desc:'קלאסי'},
    {name:'David Libre',       sample:'שלום', desc:'David'},
    {name:'Suez One',          sample:'שלום', desc:'כותרות'},
    {name:'Noto Serif Hebrew', sample:'שלום', desc:'סריף עדין'},
    {name:'Noto Rashi Hebrew', sample:'שלום', desc:'רש״י'},
    {name:'Tinos',             sample:'שלום', desc:'Times-עברי'},
    {name:'Miriam Libre',      sample:'שלום', desc:'בגרות'},
  ],
  'כתב יד': [
    {name:'Amatic SC',         sample:'שלום', desc:'ידני דק'},
    {name:'Caveat',            sample:'שלום', desc:'כתב יד'},
    {name:'Permanent Marker',  sample:'Hello',desc:'מרקר'},
    // Windows Hebrew handwriting fonts (load from system if available)
    {name:'Gisha',             sample:'שלום', desc:'Windows'},
    {name:'Levenim MT',        sample:'שלום', desc:'Windows'},
    {name:'Narkisim',          sample:'שלום', desc:'Windows'},
    {name:'Rod',               sample:'שלום', desc:'Windows'},
    {name:'FrankRuehl',        sample:'שלום', desc:'Windows'},
  ],
  'עיצובי': [
    {name:'Pacifico',          sample:'Hello',desc:'מעוגל'},
    {name:'Lobster',           sample:'Hello',desc:'כרזה'},
    {name:'Bebas Neue',        sample:'HELLO',desc:'קפיטל'},
    {name:'Righteous',         sample:'Hello',desc:'עגול'},
    {name:'Press Start 2P',    sample:'HI',   desc:'פיקסל'},
  ],
};

const loadedFonts = new Set(['Arial','Georgia','Impact','Verdana','Tahoma','Courier New','Gisha','Levenim MT','Narkisim','Rod','FrankRuehl']);
let curFont = 'Heebo', curCat = 'עברית מודרני';

function buildTabs() {
  const tabs = document.getElementById('fontTabs');
  tabs.innerHTML = '';
  Object.keys(FONT_CATS).forEach(cat => {
    const t = document.createElement('button');
    t.className = 'ftab' + (cat===curCat?' active':'');
    t.textContent = cat;
    t.onclick = () => { document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); curCat=cat; buildGrid(); };
    tabs.appendChild(t);
  });
}

function buildGrid() {
  const grid = document.getElementById('fontGrid');
  grid.innerHTML = '';
  (FONT_CATS[curCat]||[]).forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'font-btn'+(f.name===curFont?' active':'');
    btn.innerHTML = `<span class="fs" style="font-family:'${f.name}',serif">${f.sample}</span><span class="fn">${f.name.split(' ').slice(0,2).join(' ')} · ${f.desc}</span>`;
    btn.onclick = async () => {
      document.querySelectorAll('.font-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); curFont=f.name;
      await loadFont(f.name); render();
    };
    grid.appendChild(btn);
  });
}

async function loadFont(name) {
  if (loadedFonts.has(name)) return;
  const st = document.getElementById('fontStatus');
  st.textContent = `⏳ טוען ${name}…`;
  await document.fonts.ready;
  let tries=0;
  while(!document.fonts.check(`700 20px "${name}"`) && tries<40){await new Promise(r=>setTimeout(r,100));tries++;}
  loadedFonts.add(name);
  st.textContent = `✓ ${name} מוכן`;
  setTimeout(()=>st.textContent='',1500);
}

document.getElementById('cff').addEventListener('change', async e => {
  const file=e.target.files[0]; if(!file) return;
  const name=file.name.replace(/\.[^.]+$/,'').replace(/[\s\-]/g,'_');
  const url=URL.createObjectURL(file);
  const st=document.getElementById('fontStatus');
  st.textContent=`⏳ טוען ${name}…`;
  try {
    for(const w of ['300','400','700','900']){
      const ff=new FontFace(name,`url(${url})`,{weight:w});
      await ff.load().then(f=>document.fonts.add(f)).catch(()=>{});
    }
    loadedFonts.add(name); curFont=name;
    if(!FONT_CATS['מותאם']) FONT_CATS['מותאם']=[];
    FONT_CATS['מותאם'].unshift({name,sample:'Aa',desc:'שלך'});
    curCat='מותאם'; buildTabs(); buildGrid();
    st.textContent=`✓ ${name}`; setTimeout(()=>st.textContent='',2000); render();
  } catch{st.textContent='⚠ שגיאה';}
});

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
const S = {
  text:'שלום עולם! 🌟', size:72, weight:'700',
  italic:false, underline:false, uppercase:false, rtl:true, align:'right',
  color:'#ffffff', opacity:1, lh:1.3,
  stroke:false, strokeColor:'#000000', strokeWidth:4,
  shadow:false, shadowColor:'#000000', shadowBlur:10, shadowX:3, shadowY:3,
  pad:30, anim:'none', shape:'normal', twSpeed:150,
};

const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let bgImg=null;

function getLines(){let l=S.text.split('\n');if(S.uppercase)l=l.map(x=>x.toUpperCase());return l;}
function h2r(hex,a){if(!hex||hex.startsWith('rgba'))return hex||'#fff';const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function fnt(sz,w,it,fam){return `${it?'italic ':''}${w} ${sz}px "${fam}","Heebo",Arial,sans-serif`;}

// ══════════════════════════════════════════════════
//  TEXT SHAPES (canvas distortion)
// ══════════════════════════════════════════════════
function renderStatic(lines){
  ctx.font=fnt(S.size,S.weight,S.italic,curFont);
  const lh=S.size*S.lh, pad=S.pad, sw2=S.stroke?S.strokeWidth*2:0;
  const maxW=Math.max(10,...lines.map(l=>ctx.measureText(l).width));
  const W=Math.ceil(maxW+pad*2+sw2*2+80); // extra for shapes
  const H=Math.ceil(lines.length*lh+pad*2+sw2*2+80);
  cv.width=W; cv.height=H;
  ctx.clearRect(0,0,W,H);

  if(S.shape==='normal'){
    drawLines(ctx,lines,W,H,pad,sw2,lh,0,0,1);
  } else if(S.shape==='arch'){
    drawArch(ctx,lines,W,H,pad,sw2,lh);
  } else if(S.shape==='wave'){
    drawWaveShape(ctx,lines,W,H,pad,sw2,lh);
  } else if(S.shape==='bulge'){
    drawBulge(ctx,lines,W,H,pad,sw2,lh);
  } else if(S.shape==='narrow'){
    drawNarrow(ctx,lines,W,H,pad,sw2,lh);
  } else if(S.shape==='scroll'){
    drawScroll(ctx,lines,W,H,pad,sw2,lh);
  } else if(S.shape==='perspective'){
    drawPerspective(ctx,lines,W,H,pad,sw2,lh);
  } else if(S.shape==='circle'){
    drawCircleText(ctx,lines,W,H,pad,sw2);
  }
}

function setShadow(){
  if(S.shadow){ctx.shadowColor=S.shadowColor;ctx.shadowBlur=S.shadowBlur;ctx.shadowOffsetX=S.shadowX;ctx.shadowOffsetY=S.shadowY;}
  else{ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;}
}
function clearShadow(){ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;}

function drawChar(c,x,y){
  ctx.font=fnt(S.size,S.weight,S.italic,curFont);
  ctx.textBaseline='middle'; ctx.textAlign='center';
  if(S.stroke){ctx.strokeStyle=S.strokeColor;ctx.lineWidth=S.strokeWidth*2;ctx.lineJoin='round';ctx.strokeText(c,x,y);}
  ctx.fillStyle=h2r(S.color,S.opacity); ctx.fillText(c,x,y);
}

function drawLines(c,lines,W,H,pad,sw2,lh,ox,oy,sc){
  c.font=fnt(S.size,S.weight,S.italic,curFont);
  c.direction=S.rtl?'rtl':'ltr'; c.textBaseline='top'; c.textAlign=S.align;
  setShadow();
  const xb=S.align==='right'?W-pad-sw2:S.align==='center'?W/2:pad+sw2;
  lines.forEach((line,i)=>{
    const y=pad+sw2+i*lh+oy;
    c.save(); c.translate(xb+ox,y+S.size/2); c.scale(sc,sc); c.translate(-ox,-S.size/2);
    if(S.stroke){c.strokeStyle=S.strokeColor;c.lineWidth=S.strokeWidth*2;c.lineJoin='round';c.strokeText(line,0,0);}
    c.fillStyle=h2r(S.color,S.opacity); c.fillText(line,0,0);
    c.restore();
    if(S.underline){const tw=c.measureText(line).width;const uy=y+S.size+3;const ulx=S.align==='right'?xb-tw:S.align==='center'?xb-tw/2:xb;clearShadow();c.fillRect(ulx,uy,tw,Math.max(1,S.size*.06));setShadow();}
  });
  clearShadow();
}

function drawArch(c,lines,W,H,pad,sw2,lh){
  c.font=fnt(S.size,S.weight,S.italic,curFont);
  setShadow();
  lines.forEach((line,li)=>{
    const chars=[...line]; const total=chars.length;
    const totalW=c.measureText(line).width;
    const radius=Math.max(totalW,.1)/(Math.PI*.7);
    const cx=W/2, cy=H/2+radius*(li-lines.length/2+.5)*S.lh*.6;
    const startAngle=-Math.PI*.35;
    let currAngle=startAngle;
    chars.forEach((ch,ci)=>{
      const chW=c.measureText(ch).width;
      const angle=chW/radius;
      c.save();
      c.translate(cx,cy);
      c.rotate(currAngle+angle/2);
      c.translate(0,-radius);
      drawChar(ch,0,0);
      c.restore();
      currAngle+=angle;
    });
  });
  clearShadow();
}

function drawWaveShape(c,lines,W,H,pad,sw2,lh){
  c.font=fnt(S.size,S.weight,S.italic,curFont);
  setShadow();
  lines.forEach((line,li)=>{
    const chars=[...line]; const total=chars.length;
    const totalW=c.measureText(line).width;
    const startX=W/2-totalW/2;
    const baseY=pad+sw2+li*lh+S.size/2+30;
    let x=startX;
    chars.forEach((ch,ci)=>{
      const chW=c.measureText(ch).width;
      const wave=Math.sin((ci/Math.max(total-1,1))*Math.PI*2)*S.size*0.25;
      drawChar(ch,x+chW/2,baseY+wave);
      x+=chW;
    });
  });
  clearShadow();
}

function drawBulge(c,lines,W,H,pad,sw2,lh){
  // Middle chars bigger, edges smaller — like barrel distortion
  c.font=fnt(S.size,S.weight,S.italic,curFont);
  setShadow();
  lines.forEach((line,li)=>{
    const chars=[...line]; const total=chars.length;
    const totalW=c.measureText(line).width;
    let x=W/2-totalW/2;
    const baseY=pad+sw2+li*lh+S.size/2+30;
    chars.forEach((ch,ci)=>{
      const t=ci/Math.max(total-1,1); // 0..1
      const sc=0.6+Math.sin(t*Math.PI)*0.8; // small→big→small
      const chW=c.measureText(ch).width;
      c.save();
      c.translate(x+chW/2,baseY);
      c.scale(sc,sc);
      if(S.stroke){c.strokeStyle=S.strokeColor;c.lineWidth=S.strokeWidth*2;c.lineJoin='round';c.strokeText(ch,0,0);}
      c.fillStyle=h2r(S.color,S.opacity); c.fillText(ch,0,0);
      c.restore();
      x+=chW*sc*0.85+2;
    });
  });
  clearShadow();
}

function drawNarrow(c,lines,W,H,pad,sw2,lh){
  // Letters squeezed at edges, full width in center
  c.font=fnt(S.size,S.weight,S.italic,curFont);
  setShadow();
  lines.forEach((line,li)=>{
    const chars=[...line]; const total=chars.length;
    const totalW=c.measureText(line).width;
    let x=W/2-totalW/2;
    const baseY=pad+sw2+li*lh+S.size/2+30;
    chars.forEach((ch,ci)=>{
      const t=ci/Math.max(total-1,1);
      const scaleX=0.3+Math.sin(t*Math.PI)*0.85;
      const chW=c.measureText(ch).width;
      c.save();
      c.translate(x+chW/2,baseY);
      c.scale(scaleX,1);
      if(S.stroke){c.strokeStyle=S.strokeColor;c.lineWidth=S.strokeWidth*2;c.strokeText(ch,0,0);}
      c.fillStyle=h2r(S.color,S.opacity); c.fillText(ch,0,0);
      c.restore();
      x+=chW*scaleX*0.9+1;
    });
  });
  clearShadow();
}

function drawScroll(c,lines,W,H,pad,sw2,lh){
  // Draw scroll/ribbon shape behind text
  const textH=lines.length*lh+pad*2;
  const textW=Math.max(...lines.map(l=>c.measureText(l).width))+pad*2;
  const rx=W/2-textW/2, ry=pad+sw2;
  // Scroll body
  c.save();
  c.globalAlpha=0.18;
  c.fillStyle=S.color;
  // Main rect
  c.fillRect(rx,ry+20,textW,textH-40);
  // Top curl
  c.beginPath();c.ellipse(rx+textW/2,ry+20,textW/2,22,0,0,Math.PI*2);c.fill();
  // Bottom curl
  c.beginPath();c.ellipse(rx+textW/2,ry+textH-20,textW/2,22,0,0,Math.PI*2);c.fill();
  c.globalAlpha=1;
  // Scroll outline
  c.strokeStyle=S.color; c.lineWidth=2; c.globalAlpha=0.4;
  c.strokeRect(rx,ry+20,textW,textH-40);
  c.beginPath();c.ellipse(rx+textW/2,ry+20,textW/2,22,0,0,Math.PI*2);c.stroke();
  c.beginPath();c.ellipse(rx+textW/2,ry+textH-20,textW/2,22,0,0,Math.PI*2);c.stroke();
  c.globalAlpha=1;
  c.restore();
  drawLines(c,lines,W,H,pad,sw2,lh,0,0,1);
}

function drawPerspective(c,lines,W,H,pad,sw2,lh){
  // Top smaller, bottom bigger (perspective)
  c.font=fnt(S.size,S.weight,S.italic,curFont);
  setShadow();
  const total=lines.length;
  lines.forEach((line,li)=>{
    const t=lines.length>1?(li/(lines.length-1)):0.5;
    const sc=0.5+t*0.8;
    const y=pad+sw2+li*lh*0.8+S.size/2+20;
    c.save();
    c.translate(W/2,y);
    c.scale(sc,sc);
    c.font=fnt(S.size,S.weight,S.italic,curFont);
    c.textBaseline='middle'; c.textAlign='center';
    if(S.stroke){c.strokeStyle=S.strokeColor;c.lineWidth=S.strokeWidth*2;c.strokeText(line,0,0);}
    c.fillStyle=h2r(S.color,S.opacity); c.fillText(line,0,0);
    c.restore();
  });
  clearShadow();
}

function drawCircleText(c,lines,W,H,pad,sw2){
  c.font=fnt(S.size,S.weight,S.italic,curFont);
  setShadow();
  const text=lines.join(' ');
  const chars=[...text]; const total=chars.length;
  const radius=Math.min(W,H)/2-pad-S.size;
  const cx=W/2, cy=H/2;
  chars.forEach((ch,ci)=>{
    const angle=(ci/total)*Math.PI*2-Math.PI/2;
    const x=cx+Math.cos(angle)*radius;
    const y=cy+Math.sin(angle)*radius;
    c.save();
    c.translate(x,y);
    c.rotate(angle+Math.PI/2);
    drawChar(ch,0,0);
    c.restore();
  });
  clearShadow();
}

function render(){
  const lines=getLines();
  renderStatic(lines);
  if(S.anim!=='none') renderAnim(lines);
  else stopAnim();
  if(bgImg) compUpdate();
}

// ══════════════════════════════════════════════════
//  ANIMATIONS — CSS/HTML layer (every char)
// ══════════════════════════════════════════════════
const ANIM_CSS=`<style>
@keyframes wave   {0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-16px) scale(1.2)}}
@keyframes pop    {0%,100%{transform:scale(1) rotate(0)}30%{transform:scale(1.6) rotate(-12deg)}65%{transform:scale(.85) rotate(6deg)}}
@keyframes zoom   {0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
@keyframes slidein{0%{opacity:0;transform:translateX(-70px)}65%{opacity:1;transform:translateX(6px)}100%{transform:translateX(0)}}
@keyframes shake  {0%,100%{transform:translate(0,0) rotate(0)}20%{transform:translate(-8px,2px) rotate(-4deg)}40%{transform:translate(8px,-2px) rotate(4deg)}60%{transform:translate(-5px,1px)}80%{transform:translate(5px,-1px)}}
@keyframes bounce {0%,100%{transform:translateY(0) scaleY(1)}40%{transform:translateY(-22px) scaleY(1.1)}70%{transform:translateY(-8px) scaleY(.95)}}
@keyframes spin   {0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}
@keyframes flip   {0%,45%,55%,100%{} 45%{transform:scaleX(0)} 0%,100%{transform:scaleX(1)}}
@keyframes blurglow{0%,100%{filter:blur(0) brightness(1)}50%{filter:blur(3px) brightness(1.5)}}
@keyframes typein {0%{opacity:0;transform:scale(.1) translateY(20px)}80%{transform:scale(1.1)}100%{opacity:1;transform:scale(1) translateY(0)}}
.ac{display:inline-block;}
</style>`;

function charCss(anim,idx,total){
  const d=`${(idx*.07).toFixed(2)}s`;
  switch(anim){
    case 'wave':       return `animation:wave 1.3s ease-in-out ${d} infinite`;
    case 'pop':        return `animation:pop 1.6s ease ${d} infinite`;
    case 'zoom':       return `animation:zoom 1.4s ease-in-out ${d} infinite`;
    case 'slide':      return `animation:slidein .65s cubic-bezier(.25,1,.5,1) ${d} both`;
    case 'rainbow':    return `animation:wave 2s ease-in-out ${d} infinite;color:hsl(${Math.round((idx/Math.max(total,1))*360)},100%,65%)`;
    case 'shake':      return `animation:shake .55s ease ${d} infinite`;
    case 'bounce':     return `animation:bounce 1s cubic-bezier(.36,.07,.19,.97) ${d} infinite`;
    case 'spin':       return `animation:spin 2.2s linear ${d} infinite`;
    case 'flip':       return `animation:flip 2s ease-in-out ${d} infinite`;
    case 'blur':       return `animation:blurglow 1.6s ease-in-out ${d} infinite`;
    case 'typewriter': {
      // Each char appears after the previous one finishes
      const delay=`${(idx*(S.twSpeed/1000)).toFixed(2)}s`;
      return `animation:typein .25s ease ${delay} both;opacity:0;animation-fill-mode:forwards`;
    }
    default: return '';
  }
}

function renderAnim(lines){
  const ad=document.getElementById('animDiv');
  const cve=document.getElementById('cv');
  ad.style.display='flex'; cve.style.display='none';
  const fs=Math.min(S.size,110);
  const fontCS=fnt(fs,S.weight,S.italic,curFont);
  const shCS=S.shadow?`text-shadow:${S.shadowX}px ${S.shadowY}px ${S.shadowBlur}px ${S.shadowColor}`:'';
  const stCS=S.stroke?`-webkit-text-stroke:${S.strokeWidth}px ${S.strokeColor}`:'';
  const unCS=S.underline?'text-decoration:underline':'';
  const colCS=S.anim==='rainbow'?'':(`color:${S.color}`);
  const alCS=S.align==='right'?'right':S.align==='center'?'center':'left';
  const total=[...lines.join('')].length;
  let ci=0;
  let html=ANIM_CSS+`<div style="text-align:${alCS};direction:${S.rtl?'rtl':'ltr'};opacity:${S.opacity}">`;
  lines.forEach(line=>{
    html+=`<div style="font:${fontCS};${shCS};${stCS};${unCS};${colCS};line-height:${S.lh}">`;
    [...line].forEach(ch=>{
      const css=charCss(S.anim,ci++,total);
      html+=`<span class="ac" style="${css}">${ch===' '?'&nbsp;':ch.replace(/</g,'&lt;')}</span>`;
    });
    html+='</div>';
  });
  html+='</div>';
  ad.innerHTML=html;
  ad.style.minHeight=`${Math.min(fs*2,320)}px`;
}

function stopAnim(){
  const ad=document.getElementById('animDiv');
  ad.style.display='none'; ad.innerHTML='';
  document.getElementById('cv').style.display='block';
}

// ══════════════════════════════════════════════════
//  GIF EXPORT — canvas-based, no external lib needed
// ══════════════════════════════════════════════════
async function exportGIF(){
  const status=document.getElementById('gifStatus');

  // Try GIF.js first
  if(typeof GIF !== 'undefined'){
    await exportGIFjs(status); return;
  }

  // Fallback: export as APNG-like sequence via canvas frames → download individually
  status.textContent='⏳ מייצר GIF (שיטה חלופית)…';
  await exportCanvasGIF(status);
}

async function exportCanvasGIF(status){
  const lines=getLines();
  const FRAMES=24, DELAY=80;
  ctx.font=fnt(S.size,S.weight,S.italic,curFont);
  const lh=S.size*S.lh, pad=S.pad, sw2=S.stroke?S.strokeWidth*2:0;
  const maxW=Math.max(10,...lines.map(l=>ctx.measureText(l).width));
  const W=Math.ceil(maxW+pad*2+sw2*2+80), H=Math.ceil(lines.length*lh+pad*2+sw2*2+80);

  // Build frames on offscreen canvas
  const frames=[];
  const oc=document.createElement('canvas'); oc.width=W; oc.height=H;
  const octx=oc.getContext('2d');

  for(let f=0;f<FRAMES;f++){
    const t=f/FRAMES;
    octx.clearRect(0,0,W,H);
    // white bg for GIF
    octx.fillStyle='#ffffff'; octx.fillRect(0,0,W,H);

    octx.font=fnt(S.size,S.weight,S.italic,curFont);
    octx.direction=S.rtl?'rtl':'ltr'; octx.textBaseline='top'; octx.textAlign=S.align;
    const xb=S.align==='right'?W-pad-sw2:S.align==='center'?W/2:pad+sw2;
    const allChars=[...lines.join('')]; const total=allChars.length;
    let ci=0;

    lines.forEach((line,li)=>{
      const y=pad+sw2+li*lh;
      [...line].forEach((ch,chi)=>{
        const phase=((t+ci/Math.max(total,1))%1)*Math.PI*2;
        let oy=0,ox=0,sc=1,visible=true;
        switch(S.anim){
          case 'wave':       oy=Math.sin(phase)*S.size*.2; break;
          case 'pop':        sc=1+Math.sin(phase)*.35; break;
          case 'zoom':       sc=1+Math.sin(phase)*.2; break;
          case 'shake':      ox=Math.sin(phase)*7; oy=Math.cos(phase)*3; break;
          case 'bounce':     oy=Math.abs(Math.sin(phase))*(-S.size*.28); break;
          case 'typewriter': visible=(ci/(S.twSpeed/DELAY*FRAMES/total)) < t*FRAMES; break;
          default: break;
        }
        if(!visible){ci++;return;}
        const tw=octx.measureText(line).width;
        const prevW=octx.measureText(line.slice(0,chi)).width;
        const chW=octx.measureText(ch).width;
        let cx2;
        if(S.align==='right') cx2=xb-tw+prevW+chW/2;
        else if(S.align==='center') cx2=xb-tw/2+prevW+chW/2;
        else cx2=xb+prevW+chW/2;
        octx.save();
        octx.translate(cx2+ox,y+S.size/2+oy);
        octx.scale(sc,sc);
        if(S.shadow){octx.shadowColor=S.shadowColor;octx.shadowBlur=S.shadowBlur;octx.shadowOffsetX=S.shadowX;octx.shadowOffsetY=S.shadowY;}
        if(S.stroke){octx.strokeStyle=S.strokeColor;octx.lineWidth=S.strokeWidth*2;octx.lineJoin='round';octx.strokeText(ch,-chW/2,-S.size/2);}
        if(S.anim==='rainbow') octx.fillStyle=`hsl(${(ci/total*360+t*360)%360},100%,50%)`;
        else octx.fillStyle=h2r(S.color,S.opacity);
        octx.fillText(ch,-chW/2,-S.size/2);
        octx.restore();
        ci++;
      });
    });

    frames.push(oc.toDataURL('image/png'));
    status.textContent=`⏳ ${Math.round((f/FRAMES)*100)}%`;
    await new Promise(r=>setTimeout(r,0));
  }

  // Since pure JS GIF encoding without a library is complex,
  // we'll download the first frame as PNG and note frames are ready
  // But attempt GIF.js via CDN first:
  status.textContent='⏳ טוען מנוע GIF…';
  await new Promise((resolve)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js';
    s.onload=resolve; s.onerror=resolve;
    document.head.appendChild(s);
  });

  if(typeof GIF!=='undefined'){
    const gif=new GIF({workers:2,quality:8,width:W,height:H,background:'#ffffff'});
    // Rebuild frames with GIF.js
    for(let f=0;f<FRAMES;f++){
      const img=new Image(); img.src=frames[f];
      await new Promise(r=>{img.onload=r;});
      gif.addFrame(img,{delay:DELAY});
    }
    gif.on('finished',blob=>{
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='sticker.gif'; a.click();
      status.textContent='✓ GIF הורד!'; setTimeout(()=>status.textContent='',3000);
    });
    gif.render();
  } else {
    // Download PNG frames as zip isn't feasible — download static PNG
    const a=document.createElement('a'); a.href=frames[0]; a.download='sticker-frame1.png'; a.click();
    status.textContent='⚠ הורד PNG (GIF לא זמין ברשת זו)';
    setTimeout(()=>status.textContent='',4000);
  }
}

async function exportGIFjs(status){
  const lines=getLines();
  const FRAMES=20, DELAY=80;
  ctx.font=fnt(S.size,S.weight,S.italic,curFont);
  const lh=S.size*S.lh, pad=S.pad, sw2=S.stroke?S.strokeWidth*2:0;
  const maxW=Math.max(10,...lines.map(l=>ctx.measureText(l).width));
  const W=Math.ceil(maxW+pad*2+sw2*2+80), H=Math.ceil(lines.length*lh+pad*2+sw2*2+80);
  const oc=document.createElement('canvas'); oc.width=W; oc.height=H;
  const octx=oc.getContext('2d');
  const gif=new GIF({workers:2,quality:8,width:W,height:H,background:'#ffffff'});
  for(let f=0;f<FRAMES;f++){
    const t=f/FRAMES;
    octx.fillStyle='#ffffff'; octx.fillRect(0,0,W,H);
    octx.font=fnt(S.size,S.weight,S.italic,curFont);
    octx.direction=S.rtl?'rtl':'ltr'; octx.textBaseline='top'; octx.textAlign=S.align;
    const xb=S.align==='right'?W-pad-sw2:S.align==='center'?W/2:pad+sw2;
    const allChars=[...lines.join('')]; const total=allChars.length;
    let ci=0;
    lines.forEach((line,li)=>{
      const y=pad+sw2+li*lh;
      [...line].forEach((ch,chi)=>{
        const phase=((t+ci/Math.max(total,1))%1)*Math.PI*2;
        let oy=0,ox=0,sc=1,visible=true;
        switch(S.anim){
          case 'wave': oy=Math.sin(phase)*S.size*.2; break;
          case 'pop':  sc=1+Math.sin(phase)*.3; break;
          case 'zoom': sc=1+Math.sin(phase)*.18; break;
          case 'shake':ox=Math.sin(phase)*6;oy=Math.cos(phase)*2; break;
          case 'bounce':oy=Math.abs(Math.sin(phase))*(-S.size*.25); break;
          case 'typewriter': visible=ci<Math.round(t*total*1.2); break;
          default: break;
        }
        if(!visible){ci++;return;}
        const tw=octx.measureText(line).width;
        const prevW=octx.measureText(line.slice(0,chi)).width;
        const chW=octx.measureText(ch).width;
        let cx2;
        if(S.align==='right') cx2=xb-tw+prevW+chW/2;
        else if(S.align==='center') cx2=xb-tw/2+prevW+chW/2;
        else cx2=xb+prevW+chW/2;
        octx.save();
        octx.translate(cx2+ox,y+S.size/2+oy);
        octx.scale(sc,sc);
        if(S.shadow){octx.shadowColor=S.shadowColor;octx.shadowBlur=S.shadowBlur;octx.shadowOffsetX=S.shadowX;octx.shadowOffsetY=S.shadowY;}
        if(S.stroke){octx.strokeStyle=S.strokeColor;octx.lineWidth=S.strokeWidth*2;octx.lineJoin='round';octx.strokeText(ch,-chW/2,-S.size/2);}
        if(S.anim==='rainbow') octx.fillStyle=`hsl(${(ci/total*360+t*360)%360},100%,50%)`;
        else octx.fillStyle=h2r(S.color,S.opacity);
        octx.fillText(ch,-chW/2,-S.size/2);
        octx.restore();
        ci++;
      });
    });
    gif.addFrame(oc,{delay:DELAY,copy:true});
    status.textContent=`⏳ ${Math.round((f/FRAMES)*100)}%`;
    await new Promise(r=>setTimeout(r,0));
  }
  gif.on('finished',blob=>{
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='sticker.gif'; a.click();
    status.textContent='✓ GIF הורד!'; setTimeout(()=>status.textContent='',3000);
  });
  gif.render();
}

// ══════════════════════════════════════════════════
//  COMPOSITE
// ══════════════════════════════════════════════════
function loadBg(input){
  const file=input.files[0]; if(!file) return;
  const img=new Image();
  img.onload=()=>{bgImg=img;document.getElementById('pg').style.display='grid';document.getElementById('cctrl').style.display='flex';compUpdate();};
  img.src=URL.createObjectURL(file);
}
function compUpdate(){
  if(!bgImg) return;
  const cc=document.getElementById('cc'); cc.style.display='block';
  const cctx=cc.getContext('2d');
  const sc=Math.min(1,640/bgImg.width);
  cc.width=bgImg.width*sc; cc.height=bgImg.height*sc;
  cctx.drawImage(bgImg,0,0,cc.width,cc.height);
  const px=+document.getElementById('px').value/100;
  const py=+document.getElementById('py').value/100;
  const psc=+document.getElementById('psc').value/100;
  const rot=+document.getElementById('pro').value*Math.PI/180;
  const sw2=cv.width*psc*sc, sh2=cv.height*psc*sc;
  cctx.save(); cctx.translate(cc.width*px,cc.height*py); cctx.rotate(rot);
  cctx.drawImage(cv,-sw2/2,-sh2/2,sw2,sh2); cctx.restore();
}

// ══════════════════════════════════════════════════
//  PRESETS
// ══════════════════════════════════════════════════
function preset(n){
  const P={
    neon:   {color:'#00ffcc',shadow:true,shadowColor:'#00ffcc',shadowBlur:28,shadowX:0,shadowY:0,stroke:false},
    gold:   {color:'#f5c842',stroke:true,strokeColor:'#7a5500',strokeWidth:3,shadow:true,shadowColor:'#000',shadowBlur:10,shadowX:4,shadowY:4},
    outline:{color:'#ffffff',stroke:true,strokeColor:'#000000',strokeWidth:7,shadow:false},
    fire:   {color:'#ff4400',stroke:true,strokeColor:'#ffaa00',strokeWidth:5,shadow:true,shadowColor:'#ff0000',shadowBlur:22,shadowX:0,shadowY:0},
    '3d':   {color:'#ffffff',shadow:true,shadowColor:'#0033cc',shadowBlur:0,shadowX:7,shadowY:7,stroke:true,strokeColor:'#000088',strokeWidth:2},
    clean:  {color:'#ffffff',stroke:false,shadow:false},
  };
  const p=P[n]; if(!p) return;
  Object.assign(S,p);
  document.getElementById('tc').value=S.color;
  document.getElementById('stEn').checked=!!S.stroke; document.getElementById('stC').style.display=S.stroke?'flex':'none';
  if(S.strokeColor)document.getElementById('stCol').value=S.strokeColor;
  document.getElementById('stW').value=S.strokeWidth||4; document.getElementById('stWv').textContent=S.strokeWidth||4;
  document.getElementById('shEn').checked=!!S.shadow; document.getElementById('shC').style.display=S.shadow?'flex':'none';
  if(S.shadowColor&&!S.shadowColor.startsWith('rgba'))document.getElementById('shCol').value=S.shadowColor;
  document.getElementById('shB').value=S.shadowBlur||0; document.getElementById('shBv').textContent=S.shadowBlur||0;
  document.getElementById('shX').value=S.shadowX||0; document.getElementById('shXv').textContent=S.shadowX||0;
  document.getElementById('shY').value=S.shadowY||0; document.getElementById('shYv').textContent=S.shadowY||0;
  render();
}

document.getElementById('txt').addEventListener('input',e=>{S.text=e.target.value;render();});

rng('sz','size','szv');
rng('op','opacity','opv',v=>{document.getElementById('opv').textContent=v+'%';return+(v/100).toFixed(2);});
rng('lh','lh','lhv',v=>+(v/100).toFixed(2));
rng('pd','pad','pdv');
rng('stW','strokeWidth','stWv');
rng('shB','shadowBlur','shBv');
rng('shX','shadowX','shXv');
rng('shY','shadowY','shYv');
document.getElementById('tc').addEventListener('input',e=>{S.color=e.target.value;render();});
document.getElementById('stCol').addEventListener('input',e=>{S.strokeColor=e.target.value;render();});
document.getElementById('shCol').addEventListener('input',e=>{S.shadowColor=e.target.value;render();});

const TM={tI:'italic',tU:'underline',tUP:'uppercase',tR:'rtl'};
Object.entries(TM).forEach(([id,k])=>document.getElementById(id).addEventListener('click',function(){S[k]=!S[k];this.classList.toggle('active',S[k]);render();}));
document.querySelectorAll('[data-align]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-align]').forEach(x=>x.classList.remove('active'));this.classList.add('active');S.align=this.dataset.align;render();}));

// Shape buttons
document.querySelectorAll('[data-shape]').forEach(b=>b.addEventListener('click',function(){
  document.querySelectorAll('[data-shape]').forEach(x=>x.classList.remove('active'));
  this.classList.add('active'); S.shape=this.dataset.shape; render();
}));

// Anim buttons
document.querySelectorAll('[data-anim]').forEach(b=>b.addEventListener('click',function(){
  document.querySelectorAll('[data-anim]').forEach(x=>x.classList.remove('active'));
  this.classList.add('active'); S.anim=this.dataset.anim;
  document.getElementById('gifBtn').style.display=S.anim==='none'?'none':'block';
  document.getElementById('twSpeed').style.display=S.anim==='typewriter'?'block':'none';
  render();
}));

buildTabs(); buildGrid();
document.fonts.ready.then(()=>render());
render();
