<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גימלאטק - לשירותך בחינם</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: #f0f9f8;
    min-height: 100vh;
    display: flex;
  }
  .sidebar {
    width: 240px;
    min-width: 240px;
    background: #ffffff;
    border-left: 4px solid #2db8a0;
    padding: 24px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: fixed;
    right: 0; top: 0; bottom: 0;
    overflow-y: auto;
    box-shadow: -4px 0 20px rgba(45,184,160,0.15);
    z-index: 100;
  }
  .logo-area { text-align: center; margin-bottom: 10px; }
  .logo-img { width: 110px; height: 110px; object-fit: contain; margin: 0 auto 10px; display: block; }
  .brand-name { font-size: 17px; font-weight: 800; color: #0d6e5f; line-height: 1.35; margin-bottom: 10px; }
  .phone-link {
    font-size: 15px; font-weight: 700; color: #1a8a76;
    background: #e1f5f2; border-radius: 22px;
    padding: 7px 14px; display: inline-block;
    text-decoration: none;
    border: 1.5px solid #b2e0d8;
    transition: all 0.2s;
  }
  .phone-link:hover { background: #2db8a0; color: #fff; }
  .divider { border: none; border-top: 1.5px solid #b2e0d8; margin: 6px 0; }
  .nav-btn {
    display: flex; align-items: center; gap: 9px;
    padding: 11px 14px; border-radius: 13px;
    background: #f0f9f8;
    border: 1.5px solid #b2e0d8;
    color: #0d6e5f;
    font-size: 14px; font-weight: 700;
    font-family: 'Heebo', sans-serif;
    cursor: pointer; transition: all 0.2s ease;
    text-align: right; width: 100%;
    text-decoration: none; line-height: 1.3;
  }
  .nav-btn:hover {
    background: #2db8a0; color: #fff;
    border-color: #2db8a0;
    transform: translateX(-3px);
    box-shadow: 0 4px 12px rgba(45,184,160,0.35);
  }
  .btn-icon { font-size: 19px; flex-shrink: 0; }
  main {
    flex: 1; margin-right: 240px;
    display: flex; align-items: center; justify-content: center;
    padding: 32px; min-height: 100vh;
  }
  .hero-image {
    width: 100%; max-width: 900px;
    border-radius: 26px;
    box-shadow: 0 8px 40px rgba(45,184,160,0.2);
    border: 4px solid #b2e0d8; display: block;
  }
  @media (max-width: 700px) {
    body { flex-direction: column; }
    .sidebar { position: static; width: 100%; min-width: unset; border-left: none; border-bottom: 4px solid #2db8a0; padding: 14px 12px; gap: 7px; }
    main { margin-right: 0; padding: 18px 14px; }
  }
</style>
</head>
